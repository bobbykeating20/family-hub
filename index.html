<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keating Family Hub</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  color: white;
  min-height: 100vh;
  overflow-x: hidden;

  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 40%),
    radial-gradient(circle at 80% 30%, rgba(255,255,255,0.06), transparent 40%),
    linear-gradient(160deg, #0a1f44, #0d2f5f 40%, #05152c);
}

/* HEADER */
.header {
  text-align: center;
  padding: 40px 20px 20px;
}

.header h1 {
  font-size: 32px;
  letter-spacing: 4px;
}

.header p {
  opacity: 0.7;
  margin-top: 6px;
}

/* GRID */
.container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  padding: 20px 60px 120px;
}

/* CARDS */
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(18px);
  border-radius: 20px;
  padding: 24px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

/* CLOCK */
.time {
  font-size: 40px;
  font-weight: 600;
}

.date {
  opacity: 0.7;
  margin-top: 6px;
}

/* SCHEDULE */
.schedule {
  grid-column: span 2;
}

.schedule h2 {
  margin-bottom: 10px;
}

.day-block {
  margin-top: 14px;
}

.day-title {
  font-weight: 600;
  margin-bottom: 4px;
}

.event {
  opacity: 0.9;
  margin-left: 10px;
}

/* 🌊 OCEAN */
.ocean {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 140px;
  background: linear-gradient(to bottom, #0a3a5f, #06283d);
  overflow: hidden;
  z-index: 1;
}

.wave {
  position: absolute;
  width: 200%;
  height: 100%;
  opacity: 0.4;
}

.wave1 {
  background: radial-gradient(circle at 50% 120%, #1e90ff 20%, transparent 70%);
  animation: waveMove 8s linear infinite;
}

.wave2 {
  background: radial-gradient(circle at 50% 120%, #00bfff 20%, transparent 70%);
  animation: waveMove 12s linear infinite reverse;
  opacity: 0.3;
}

.wave3 {
  background: radial-gradient(circle at 50% 120%, #87cefa 20%, transparent 70%);
  animation: waveMove 16s linear infinite;
  opacity: 0.2;
}

@keyframes waveMove {
  from { transform: translateX(0); }
  to { transform: translateX(-50%); }
}

/* 🚢 SHIP */
.ship-container {
  position: fixed;
  bottom: 95px;
  width: 100%;
  z-index: 3;
  pointer-events: none;
}

.ship {
  width: 260px;
  position: absolute;
  left: -300px;
  animation: sail 12s linear infinite;
}

@keyframes sail {
  0% { transform: translateX(0); }
  100% { transform: translateX(calc(100vw + 300px)); }
}

</style>
</head>

<body>

<div class="header">
  <h1>KEATING FAMILY HUB</h1>
  <p>Welcome back</p>
</div>

<div class="container">

  <div class="card">
    <div class="time" id="time"></div>
    <div class="date" id="date"></div>
  </div>

  <div class="card">
    ☀️ 53° • Lynchburg
  </div>

  <div class="card" id="birthday"></div>

  <div class="card" id="trip"></div>

  <div class="card schedule">
    <h2>📅 Schedule</h2>
    <div id="nextEvent"></div>
    <div id="schedule"></div>
  </div>

  <div class="card">
    🎬 Disney Trivia: Genie was inspired by Robin Williams' improv.
  </div>

</div>

<!-- 🌊 Ocean -->
<div class="ocean">
  <div class="wave wave1"></div>
  <div class="wave wave2"></div>
  <div class="wave wave3"></div>
</div>

<!-- 🚢 Ship -->
<div class="ship-container">
  <img src="./ship.png" class="ship">
</div>

<script>

/* CLOCK */
function updateClock() {
  const now = new Date();

  document.getElementById("time").innerText =
    now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  document.getElementById("date").innerText =
    now.toLocaleDateString(undefined, { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

setInterval(updateClock, 1000);
updateClock();

/* BIRTHDAY */
const birthday = new Date("June 6, 1995");
const today = new Date();

let nextBirthday = new Date(today.getFullYear(), birthday.getMonth(), birthday.getDate());
if (today > nextBirthday) nextBirthday.setFullYear(today.getFullYear()+1);

const daysToBirthday = Math.ceil((nextBirthday - today)/(1000*60*60*24));
const age = nextBirthday.getFullYear() - birthday.getFullYear();

document.getElementById("birthday").innerText =
  `🎂 Lauren turns ${age} in ${daysToBirthday} days`;

/* TRIP */
const trip = new Date("June 5, 2026");
const diff = trip - today;

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor((diff/(1000*60*60)) % 24);

document.getElementById("trip").innerText =
  `✈️ Walt Disney World in ${days}d ${hours}h`;

/* EVENTS (EDIT THESE) */
const events = [
  { title:"Kohen Music", time:new Date("April 26, 2026 17:30") },
  { title:"Flight to Atlanta", time:new Date("April 26, 2026 19:50") },
  { title:"Kohen School", time:new Date("April 27, 2026 09:00") },
  { title:"Kohen School", time:new Date("April 28, 2026 09:00") },
  { title:"Kohen School", time:new Date("April 29, 2026 09:00") }
];

/* SCHEDULE */
function renderSchedule() {
  const now = new Date();

  const upcoming = events.filter(e => e.time > now);

  if (upcoming.length > 0) {
    const next = upcoming[0];
    const diff = next.time - now;
    const hours = Math.round(diff/(1000*60*60));
    document.getElementById("nextEvent").innerText =
      `Next event in ${hours} hours`;
  }

  let html = "";
  const daysToShow = 5;

  for (let i=0; i<daysToShow; i++) {
    const day = new Date();
    day.setDate(day.getDate()+i);

    const dayEvents = upcoming.filter(e =>
      e.time.toDateString() === day.toDateString()
    );

    if (dayEvents.length > 0) {
      html += `<div class="day-block">`;
      html += `<div class="day-title">${day.toDateString()}</div>`;

      dayEvents.forEach(e => {
        html += `<div class="event">${e.time.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} - ${e.title}</div>`;
      });

      html += `</div>`;
    }
  }

  document.getElementById("schedule").innerHTML = html;
}

renderSchedule();

</script>

</body>
</html>
