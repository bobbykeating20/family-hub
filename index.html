<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keating Family Hub</title>

<style>
body {
  margin:0;
  font-family:-apple-system,sans-serif;
  color:white;

  background:
    radial-gradient(circle at 20% 20%, rgba(0,150,255,0.15), transparent 40%),
    radial-gradient(circle at 80% 10%, rgba(255,200,120,0.1), transparent 40%),
    linear-gradient(#031024,#020617);
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  padding:30px 40px 10px;
}

.title {
  letter-spacing:4px;
  font-size:18px;
}

.greeting {
  opacity:0.7;
}

/* GRID */
.container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px 40px 40px;
}

/* CARDS */
.card {
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  border-radius:20px;
  padding:20px;
}

/* TEXT */
.big { font-size:32px; font-weight:700; }
.sub { opacity:0.7; margin-top:5px; }

/* FULL WIDTH */
.full { grid-column:span 2; }

/* EVENTS */
.event { margin:5px 0; }

</style>
</head>

<body>

<div class="header">
  <div class="title">KEATING FAMILY HUB</div>
  <div class="greeting" id="greeting"></div>
</div>

<div class="container">

  <!-- CLOCK -->
  <div class="card">
    <div class="big" id="clock"></div>
    <div class="sub" id="date"></div>
  </div>

  <!-- WEATHER -->
  <div class="card">
    <div class="big" id="weather">Loading...</div>
  </div>

  <!-- BIRTHDAY -->
  <div class="card" id="birthday"></div>

  <!-- VACATION -->
  <div class="card" id="vacation"></div>

  <!-- SCHEDULE -->
  <div class="card full">
    <div class="big">📅 Schedule</div>
    <div id="nextEvent" class="sub"></div>
    <div id="schedule"></div>
  </div>

  <!-- TRIVIA -->
  <div class="card full" id="trivia"></div>

</div>

<script>

/* GREETING */
function updateGreeting() {
  const h = new Date().getHours();
  const g =
    h < 12 ? "Good Morning" :
    h < 18 ? "Good Afternoon" :
    "Good Evening";

  document.getElementById("greeting").innerText = g;
}
updateGreeting();

/* CLOCK */
function updateClock() {
  const now = new Date();

  document.getElementById("clock").innerText =
    now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});

  document.getElementById("date").innerText =
    now.toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
setInterval(updateClock,1000);
updateClock();

/* WEATHER */
fetch("https://api.open-meteo.com/v1/forecast?latitude=37.41&longitude=-79.14&current_weather=true&temperature_unit=fahrenheit")
.then(r=>r.json())
.then(d=>{
  document.getElementById("weather").innerText =
    `☀️ ${Math.round(d.current_weather.temperature)}° • Lynchburg`;
});

/* BIRTHDAYS */
const birthdays = [
  {name:"Kohen", date:"2023-04-13"},
  {name:"Lauren", date:"1995-06-06"},
  {name:"Bobby", date:"1996-10-04"}
];

function updateBirthday(){
  const now=new Date();
  let next=null;

  birthdays.forEach(p=>{
    let b=new Date(p.date);
    let n=new Date(now.getFullYear(),b.getMonth(),b.getDate());
    if(n<now) n.setFullYear(now.getFullYear()+1);

    let diff=Math.ceil((n-now)/86400000);
    let age=n.getFullYear()-b.getFullYear();

    if(!next||diff<next.diff) next={...p,diff,age};
  });

  document.getElementById("birthday").innerText =
    `🎂 ${next.name} turns ${next.age} in ${next.diff} days`;
}
updateBirthday();

/* VACATION */
const trip=new Date("2026-06-05");

function updateTrip(){
  const now=new Date();
  const diff=trip-now;

  const d=Math.floor(diff/86400000);
  const h=Math.floor((diff/3600000)%24);
  const m=Math.floor((diff/60000)%60);

  document.getElementById("vacation").innerText =
    `✈️ Disney Trip in ${d}d ${h}h ${m}m`;
}
setInterval(updateTrip,60000);
updateTrip();

/* EVENTS FROM CALENDAR */
function getEvents(){
  return JSON.parse(localStorage.getItem("events")||"[]")
    .map(e=>({...e,time:new Date(e.time)}))
    .sort((a,b)=>a.time-b.time);
}

function renderSchedule(){
  const now=new Date();
  const events=getEvents().filter(e=>e.time>now);

  if(events.length){
    const hrs=Math.floor((events[0].time-now)/3600000);
    document.getElementById("nextEvent").innerText =
      `Next event in ${hrs} hours`;
  }

  let html="";

  for(let i=0;i<5;i++){
    const day=new Date();
    day.setDate(day.getDate()+i);

    const dayEvents=events.filter(e =>
      e.time.toDateString()===day.toDateString()
    );

    if(dayEvents.length){
      html+=`<div class="sub">${day.toDateString()}</div>`;

      dayEvents.forEach(e=>{
        html+=`<div class="event">
          ${e.time.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
          — ${e.title}
        </div>`;
      });
    }
  }

  if(!html) html="No events";

  document.getElementById("schedule").innerHTML=html;
}
renderSchedule();
window.addEventListener("storage",renderSchedule);

/* DISNEY TRIVIA (changes daily at 2AM) */
const triviaList=[
  "Mickey was almost named Mortimer.",
  "Cinderella Castle has no bricks.",
  "Toy Story was Pixar’s first film.",
  "Epcot was Walt Disney’s real city vision.",
  "The Jungle Cruise skippers improv every ride."
];

function updateTrivia(){
  const now=new Date();
  const dayIndex=Math.floor((now - new Date(2020,0,1)) / 86400000);
  const trivia = triviaList[dayIndex % triviaList.length];

  document.getElementById("trivia").innerText =
    "🎬 Disney Trivia: " + trivia;
}
updateTrivia();

</script>

</body>
</html>
