<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Family Hub</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at top, #1a1a2e, #000000);
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 50px 80px;
  box-sizing: border-box;
  gap: 25px;
}

.top-row, .middle-row {
  display: flex;
  justify-content: space-between;
}

.top-row { font-size: 36px; }
.middle-row { font-size: 30px; }

.card {
  background: rgba(255,255,255,0.06);
  padding: 25px 35px;
  border-radius: 22px;
  backdrop-filter: blur(12px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}

.schedule {
  flex-grow: 1;
  font-size: 26px;
}

.trivia {
  font-size: 24px;
  opacity: 0.9;
}
</style>
</head>

<body>
<div class="container">

<!-- TOP -->
<div class="top-row">
  <div class="card" id="clock"></div>
  <div class="card" id="weather">Loading weather...</div>
</div>

<!-- MIDDLE -->
<div class="middle-row">
  <div class="card" id="birthday"></div>
  <div class="card" id="countdown"></div>
</div>

<!-- SCHEDULE -->
<div class="card schedule">
  📅 Today's Schedule
  <div id="events" style="margin-top:15px;"></div>
</div>

<!-- TRIVIA -->
<div class="card trivia" id="trivia"></div>

</div>

<script>
// CLOCK (WITH SECONDS)
function updateClock() {
  const now = new Date();

  const time = now.toLocaleTimeString([], {
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit'
  });

  const date = now.toLocaleDateString(undefined, {
    weekday: 'long',
    year: 'numeric',
    month: 'long',
    day: 'numeric'
  });

  document.getElementById("clock").innerHTML =
    `🕒 ${time}<br><span style="font-size:20px;">${date}</span>`;
}
setInterval(updateClock, 1000);
updateClock();

// WEATHER
async function getWeather() {
  try {
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=37.4138&longitude=-79.1422&current_weather=true&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=America/New_York");
    const data = await res.json();

    const current = Math.round(data.current_weather.temperature);
    const high = Math.round(data.daily.temperature_2m_max[0]);
    const low = Math.round(data.daily.temperature_2m_min[0]);

    document.getElementById("weather").innerHTML =
      `☀️ ${current}° (H:${high}° L:${low}°) • Lynchburg`;
  } catch {
    document.getElementById("weather").innerText = "Weather unavailable";
  }
}
getWeather();
setInterval(getWeather, 600000);

// BIRTHDAY
const birthdays = [
  { name: "Kohen", date: "2023-04-13" },
  { name: "Lauren", date: "1995-06-06" },
  { name: "Bobby", date: "1996-10-04" }
];

function updateBirthday() {
  const today = new Date();
  let next = null;
  let minDiff = Infinity;

  birthdays.forEach(b => {
    const nextBirthday = new Date(today.getFullYear(), new Date(b.date).getMonth(), new Date(b.date).getDate());
    if (nextBirthday < today) nextBirthday.setFullYear(today.getFullYear() + 1);

    const diff = nextBirthday - today;

    if (diff < minDiff) {
      minDiff = diff;
      next = { ...b, nextBirthday };
    }
  });

  const days = Math.ceil(minDiff / (1000 * 60 * 60 * 24));
  const age = next.nextBirthday.getFullYear() - new Date(next.date).getFullYear();

  document.getElementById("birthday").innerHTML =
    `🎂 ${next.name} turns ${age} in ${days} days`;
}
updateBirthday();

// COUNTDOWN
const tripDate = new Date("2026-06-05T00:00:00");

function updateCountdown() {
  const now = new Date();
  const diff = tripDate - now;

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const minutes = Math.floor((diff / (1000*60)) % 60);

  document.getElementById("countdown").innerHTML =
    `✈️ Walt Disney World in ${days}d ${hours}h ${minutes}m`;
}
setInterval(updateCountdown, 60000);
updateCountdown();

// ✅ FINAL SCHEDULE (STABLE VERSION)
async function loadSchedule() {
  try {
    const url = "https://calendar.google.com/calendar/ical/lbkeating20%40gmail.com/public/basic.ics";
    const proxy = "https://corsproxy.io/?" + encodeURIComponent(url);

    const res = await fetch(proxy);
    const text = await res.text();

    const events = text.split("BEGIN:VEVENT").slice(1);

    const today = new Date();
    const todayStr = today.toISOString().slice(0,10);

    const todaysEvents = [];

    events.forEach(e => {
      const clean = e.replace(/\r?\n\s/g, "");

      const titleMatch = clean.match(/SUMMARY:(.*)/);
      const timeMatch = clean.match(/DTSTART.*:(\d{8}T\d{6})/);

      if (!titleMatch || !timeMatch) return;

      const raw = timeMatch[1];
      const dateStr = `${raw.slice(0,4)}-${raw.slice(4,6)}-${raw.slice(6,8)}`;

      if (dateStr === todayStr) {
        const hour = parseInt(raw.slice(9,11));
        const min = raw.slice(11,13);

        let h = hour % 12 || 12;
        const ampm = hour >= 12 ? "PM" : "AM";

        todaysEvents.push({
          title: titleMatch[1],
          time: `${h}:${min} ${ampm}`,
          sort: hour * 60 + parseInt(min)
        });
      }
    });

    todaysEvents.sort((a,b) => a.sort - b.sort);

    const container = document.getElementById("events");

    if (todaysEvents.length === 0) {
      container.innerHTML = "<p>No events today</p>";
      return;
    }

    container.innerHTML = todaysEvents.map(e => `
      <div style="
        padding:12px 0;
        border-bottom:1px solid rgba(255,255,255,0.1);
        display:flex;
        justify-content:space-between;
      ">
        <span>${e.title}</span>
        <span style="opacity:0.7">${e.time}</span>
      </div>
    `).join("");

  } catch {
    document.getElementById("events").innerHTML = "Unable to load schedule";
  }
}
loadSchedule();

// TRIVIA
const triviaList = [
  "Mickey Mouse's first appearance was in Steamboat Willie.",
  "Elsa was originally supposed to be a villain.",
  "The Lion King is inspired by Hamlet.",
  "Walt Disney was afraid of mice.",
  "Toy Story was the first fully computer-animated movie.",
  "Pirates of the Caribbean ride came before the movies.",
  "Genie was inspired by Robin Williams' improv.",
  "Disney World is about the size of San Francisco."
];

function updateTrivia() {
  const start = new Date(2024, 0, 1);
  const now = new Date();
  const days = Math.floor((now - start) / (1000*60*60*24));
  const index = days % triviaList.length;

  document.getElementById("trivia").innerHTML =
    `🎬 Disney Trivia: ${triviaList[index]}`;
}

updateTrivia();
setInterval(updateTrivia, 3600000);
</script>
</body>
</html>
