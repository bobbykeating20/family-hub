<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Keating Family Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ===================== */
/* 🌌 PREMIUM BACKGROUND */
/* ===================== */

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: white;

  background:
    radial-gradient(circle at 15% 20%, rgba(0,200,255,0.18), transparent 40%),
    radial-gradient(circle at 85% 10%, rgba(255,200,120,0.12), transparent 40%),
    radial-gradient(circle at 50% 100%, rgba(0,80,180,0.25), transparent 60%),
    linear-gradient(180deg, #020617 0%, #071a3a 40%, #020617 100%);
}

/* Glow layer */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(0,255,255,0.05), transparent 60%);
  animation: glow 12s ease-in-out infinite;
  pointer-events: none;
}

@keyframes glow {
  0%,100% { opacity: 0.4; }
  50% { opacity: 0.8; }
}

/* ===================== */
/* 🏰 HEADER */
/* ===================== */

.header {
  text-align: center;
  margin: 40px 0 20px;
}

.header h1 {
  font-size: 30px;
  letter-spacing: 6px;
  margin: 0;
  font-weight: 700;
}

.header p {
  opacity: 0.6;
  margin-top: 6px;
}

/* ===================== */
/* LAYOUT */
/* ===================== */

.container {
  padding: 30px 80px;
  display: flex;
  flex-direction: column;
  gap: 30px;
}

.row {
  display: flex;
  gap: 25px;
}

/* ===================== */
/* 💎 CARDS */
/* ===================== */

.card {
  flex: 1;
  padding: 28px;
  border-radius: 26px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(25px);

  border: 1px solid rgba(255,255,255,0.12);

  box-shadow:
    0 20px 60px rgba(0,0,0,0.6),
    inset 0 0 40px rgba(255,255,255,0.05);

  position: relative;
}

/* subtle edge glow */
.card::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 26px;
  border: 1px solid rgba(0,255,255,0.08);
  pointer-events: none;
}

/* ===================== */
/* TEXT */
/* ===================== */

.time {
  font-size: 56px;
  font-weight: 700;
}

.date {
  opacity: 0.7;
  margin-top: 6px;
  font-size: 16px;
}

.section-title {
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 10px;
}

.event {
  margin: 6px 0;
  font-size: 16px;
}

.subtle {
  opacity: 0.6;
  margin-bottom: 10px;
}

/* ===================== */
/* SCHEDULE */
/* ===================== */

.schedule {
  max-height: 320px;
  overflow-y: auto;
}

.schedule::-webkit-scrollbar {
  width: 6px;
}
.schedule::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
}

</style>
</head>

<body>

<div class="header">
  <h1>KEATING FAMILY HUB</h1>
  <p>Welcome back</p>
</div>

<div class="container">

  <!-- TOP -->
  <div class="row">
    <div class="card">
      <div class="time" id="time"></div>
      <div class="date" id="date"></div>
    </div>

    <div class="card" id="weather"></div>
  </div>

  <!-- SECOND -->
  <div class="row">
    <div class="card" id="birthday"></div>
    <div class="card" id="vacation"></div>
  </div>

  <!-- SCHEDULE -->
  <div class="card">
    <div class="section-title">📅 Schedule</div>
    <div class="subtle" id="nextEvent"></div>
    <div class="schedule" id="schedule"></div>
  </div>

  <!-- TRIVIA -->
  <div class="card">
    🎬 Disney Trivia: Genie was inspired by Robin Williams' improv.
  </div>

</div>

<script>

/* CLOCK */
function updateClock() {
  const now = new Date();

  document.getElementById("time").textContent =
    now.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });

  document.getElementById("date").textContent =
    now.toLocaleDateString(undefined, {
      weekday:'long', year:'numeric', month:'long', day:'numeric'
    });
}
setInterval(updateClock, 1000);
updateClock();

/* WEATHER */
fetch("https://api.open-meteo.com/v1/forecast?latitude=37.41&longitude=-79.14&current_weather=true&temperature_unit=fahrenheit")
.then(r => r.json())
.then(data => {
  document.getElementById("weather").textContent =
    `☀️ ${Math.round(data.current_weather.temperature)}° • Lynchburg`;
});

/* BIRTHDAYS */
const birthdays = [
  { name: "Kohen", date: "2023-04-13" },
  { name: "Lauren", date: "1995-06-06" },
  { name: "Bobby", date: "1996-10-04" }
];

function updateBirthday() {
  const now = new Date();
  let closest;

  birthdays.forEach(p => {
    let b = new Date(p.date);
    let next = new Date(now.getFullYear(), b.getMonth(), b.getDate());
    if (next < now) next.setFullYear(now.getFullYear()+1);

    let diff = Math.ceil((next - now)/(1000*60*60*24));
    let age = next.getFullYear() - b.getFullYear();

    if (!closest || diff < closest.diff) {
      closest = { ...p, diff, age };
    }
  });

  document.getElementById("birthday").textContent =
    `🎂 ${closest.name} turns ${closest.age} in ${closest.diff} days`;
}
updateBirthday();

/* VACATION */
const trip = new Date("2026-06-05");

function updateTrip() {
  const now = new Date();
  const diff = trip - now;

  const d = Math.floor(diff/(1000*60*60*24));
  const h = Math.floor((diff/(1000*60*60))%24);
  const m = Math.floor((diff/(1000*60))%60);

  document.getElementById("vacation").textContent =
    `✈️ Walt Disney World in ${d}d ${h}h ${m}m`;
}
setInterval(updateTrip, 60000);
updateTrip();

/* SCHEDULE */
const events = [
  { date:"2026-04-26T17:30:00", title:"Kohen Music" },
  { date:"2026-04-26T19:50:00", title:"Flight to Atlanta" },
  { date:"2026-04-27T09:00:00", title:"Kohen School" },
  { date:"2026-04-28T09:00:00", title:"Kohen School" }
];

function updateSchedule() {
  const now = new Date();
  const el = document.getElementById("schedule");
  el.innerHTML = "";

  const upcoming = events
    .map(e=>({...e, d:new Date(e.date)}))
    .filter(e=>e.d > now - 86400000)
    .sort((a,b)=>a.d-b.d);

  if (!upcoming.length) {
    el.innerHTML = "No upcoming events";
    return;
  }

  const next = upcoming.find(e=>e.d>now);
  if (next) {
    const hrs = Math.round((next.d-now)/3600000);
    document.getElementById("nextEvent").textContent =
      `Next event in ${hrs} hours`;
  }

  const grouped = {};

  upcoming.forEach(e=>{
    const key = e.d.toDateString();
    if (!grouped[key]) grouped[key]=[];
    grouped[key].push(e);
  });

  Object.keys(grouped).slice(0,5).forEach(day=>{
    const h = document.createElement("div");
    h.innerHTML = `<br><strong>${day}</strong>`;
    el.appendChild(h);

    grouped[day].forEach(e=>{
      const div = document.createElement("div");
      div.className = "event";
      div.textContent =
        `${e.d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})} - ${e.title}`;
      el.appendChild(div);
    });
  });
}

updateSchedule();

</script>

</body>
</html>
