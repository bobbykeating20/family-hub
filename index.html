<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Keating Family Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===================== */
/* 🌊 DISNEY CRUISE BACKGROUND */
/* ===================== */

body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: white;
  overflow-x: hidden;

  background:
    radial-gradient(circle at 20% 30%, rgba(0,180,200,0.15), transparent 40%),
    radial-gradient(circle at 80% 20%, rgba(255,200,120,0.12), transparent 45%),
    radial-gradient(circle at 50% 100%, rgba(0,120,255,0.15), transparent 60%),
    linear-gradient(180deg, #06142e 0%, #0b1f4d 40%, #081733 100%);
}

/* Ocean glow animation */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(0,255,255,0.06), transparent 60%);
  animation: oceanGlow 14s ease-in-out infinite;
  pointer-events: none;
}

@keyframes oceanGlow {
  0%,100% { transform: scale(1); opacity: 0.4; }
  50% { transform: scale(1.2); opacity: 0.7; }
}

/* Shimmer layer */
body::after {
  content: "";
  position: fixed;
  inset: 0;
  background: linear-gradient(120deg, transparent, rgba(255,255,255,0.04), transparent);
  animation: shimmer 8s infinite;
  pointer-events: none;
}

@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* ===================== */
/* 🏰 HEADER */
/* ===================== */

.header {
  text-align: center;
  margin-top: 30px;
  margin-bottom: 10px;
}

.header h1 {
  letter-spacing: 4px;
  font-weight: 600;
  font-size: 28px;
  margin: 0;
}

.header p {
  margin: 5px 0 0;
  opacity: 0.7;
}

/* ===================== */
/* LAYOUT */
/* ===================== */

.container {
  display: flex;
  flex-direction: column;
  gap: 25px;
  padding: 30px 60px;
}

/* Grid rows */
.row {
  display: flex;
  gap: 20px;
}

/* ===================== */
/* ✨ CARDS */
/* ===================== */

.card {
  flex: 1;
  padding: 25px;
  border-radius: 22px;

  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);

  border: 1px solid rgba(255,215,160,0.15);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.4),
    inset 0 0 40px rgba(255,255,255,0.03);

  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow:
    0 20px 50px rgba(0,0,0,0.5),
    inset 0 0 60px rgba(255,255,255,0.05);
}

/* Floating animation */
.card {
  animation: floatCard 8s ease-in-out infinite;
}

@keyframes floatCard {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* ===================== */
/* TEXT STYLES */
/* ===================== */

.time {
  font-size: 44px;
  font-weight: 600;
}

.date {
  opacity: 0.7;
  margin-top: 5px;
}

.section-title {
  font-size: 22px;
  margin-bottom: 10px;
}

.event {
  margin: 6px 0;
  opacity: 0.9;
}

.subtle {
  opacity: 0.6;
  font-size: 14px;
}

/* ===================== */
/* SCHEDULE SCROLL */
/* ===================== */

.schedule {
  max-height: 300px;
  overflow-y: auto;
}

.schedule::-webkit-scrollbar {
  width: 6px;
}
.schedule::-webkit-scrollbar-thumb {
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="header">
  <h1>KEATING FAMILY HUB</h1>
  <p>Welcome back</p>
</div>

<div class="container">

  <!-- ROW 1 -->
  <div class="row">
    <div class="card">
      <div class="time" id="time"></div>
      <div class="date" id="date"></div>
    </div>

    <div class="card" id="weather">
      Loading weather...
    </div>
  </div>

  <!-- ROW 2 -->
  <div class="row">
    <div class="card" id="birthday"></div>
    <div class="card" id="vacation"></div>
  </div>

  <!-- SCHEDULE -->
  <div class="card">
    <div class="section-title">📅 Schedule</div>
    <div class="subtle" id="nextEvent"></div>
    <div class="schedule" id="schedule"></div>
  </div>

  <!-- TRIVIA -->
  <div class="card">
    🎬 Disney Trivia: Genie was inspired by Robin Williams' improv.
  </div>

</div>

<script>
/* ===================== */
/* CLOCK */
/* ===================== */

function updateClock() {
  const now = new Date();

  document.getElementById("time").textContent =
    now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  document.getElementById("date").textContent =
    now.toLocaleDateString(undefined, {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });
}
setInterval(updateClock, 1000);
updateClock();

/* ===================== */
/* WEATHER */
/* ===================== */

fetch("https://api.open-meteo.com/v1/forecast?latitude=37.41&longitude=-79.14&current_weather=true&temperature_unit=fahrenheit")
.then(r => r.json())
.then(data => {
  document.getElementById("weather").textContent =
    `☀️ ${Math.round(data.current_weather.temperature)}° • Lynchburg`;
});

/* ===================== */
/* BIRTHDAYS */
/* ===================== */

const birthdays = [
  { name: "Kohen", date: "2023-04-13" },
  { name: "Lauren", date: "1995-06-06" },
  { name: "Bobby", date: "1996-10-04" }
];

function getNextBirthday() {
  const now = new Date();
  let soonest = null;

  birthdays.forEach(p => {
    const bday = new Date(p.date);
    const next = new Date(now.getFullYear(), bday.getMonth(), bday.getDate());

    if (next < now) next.setFullYear(now.getFullYear() + 1);

    const diff = Math.ceil((next - now) / (1000 * 60 * 60 * 24));
    const age = next.getFullYear() - bday.getFullYear();

    if (!soonest || diff < soonest.diff) {
      soonest = { ...p, diff, age };
    }
  });

  return soonest;
}

function updateBirthday() {
  const b = getNextBirthday();
  document.getElementById("birthday").textContent =
    `🎂 ${b.name} turns ${b.age} in ${b.diff} days`;
}
updateBirthday();

/* ===================== */
/* VACATION */
/* ===================== */

const tripDate = new Date("2026-06-05");

function updateVacation() {
  const now = new Date();
  const diff = tripDate - now;

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const minutes = Math.floor((diff / (1000*60)) % 60);

  document.getElementById("vacation").textContent =
    `✈️ Walt Disney World in ${days}d ${hours}h ${minutes}m`;
}
setInterval(updateVacation, 60000);
updateVacation();

/* ===================== */
/* SCHEDULE */
/* ===================== */

const events = [
  { date: "2026-04-26T17:30:00", title: "Kohen Music" },
  { date: "2026-04-26T19:50:00", title: "Flight to Atlanta" },
  { date: "2026-04-27T09:00:00", title: "Kohen School" },
  { date: "2026-04-28T09:00:00", title: "Kohen School" }
];

function updateSchedule() {
  const now = new Date();
  const container = document.getElementById("schedule");
  container.innerHTML = "";

  const upcoming = events
    .map(e => ({...e, dateObj: new Date(e.date)}))
    .filter(e => e.dateObj > now - 24*60*60*1000)
    .sort((a,b)=>a.dateObj-b.dateObj);

  if (upcoming.length === 0) {
    container.innerHTML = "No upcoming events";
    return;
  }

  const next = upcoming.find(e => e.dateObj > now);
  if (next) {
    const diffHours = Math.round((next.dateObj - now) / (1000*60*60));
    document.getElementById("nextEvent").textContent =
      `Next event in ${diffHours} hours`;
  }

  const days = {};

  upcoming.forEach(e => {
    const day = e.dateObj.toDateString();
    if (!days[day]) days[day] = [];
    days[day].push(e);
  });

  Object.keys(days).slice(0,5).forEach(day => {
    const header = document.createElement("div");
    header.innerHTML = `<br><strong>${day}</strong>`;
    container.appendChild(header);

    days[day].forEach(e => {
      const div = document.createElement("div");
      div.className = "event";
      div.textContent =
        `${e.dateObj.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})} - ${e.title}`;
      container.appendChild(div);
    });
  });
}

updateSchedule();
</script>

</body>
</html>
