<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Family Hub</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at top, #1a1a2e, #000000);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 50px 80px;
      box-sizing: border-box;
      gap: 25px;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      font-size: 36px;
    }

    .middle-row {
      display: flex;
      justify-content: space-between;
      font-size: 30px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      padding: 25px 35px;
      border-radius: 22px;
      backdrop-filter: blur(12px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: scale(1.02);
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }

    .schedule {
      flex-grow: 1;
      font-size: 26px;
    }

    .trivia {
      font-size: 24px;
      opacity: 0.9;
    }

    iframe {
      border-radius: 16px;
      margin-top: 10px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 20px;
      }

      .top-row, .middle-row {
        flex-direction: column;
        gap: 15px;
      }

      .top-row { font-size: 28px; }
      .middle-row { font-size: 24px; }
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- TOP -->
    <div class="top-row">
      <div class="card" id="clock"></div>
      <div class="card" id="weather">Loading weather...</div>
    </div>

    <!-- MIDDLE -->
    <div class="middle-row">
      <div class="card" id="birthday">Loading birthday...</div>
      <div class="card" id="countdown">Loading trip...</div>
    </div>

    <!-- SCHEDULE -->
    <div class="card schedule" id="schedule">
  📅 Today's Schedule
  <div id="events" style="margin-top:15px;"></div>
</div>

    <!-- TRIVIA -->
    <div class="card trivia" id="trivia"></div>

  </div>

  <script>
    // CLOCK
    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const date = now.toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

      document.getElementById("clock").innerHTML =
        `🕒 ${time}<br><span style="font-size:20px;">${date}</span>`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // WEATHER
    async function getWeather() {
      try {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=37.4138&longitude=-79.1422&current_weather=true&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=America/New_York");
        const data = await res.json();

        const current = Math.round(data.current_weather.temperature);
        const high = Math.round(data.daily.temperature_2m_max[0]);
        const low = Math.round(data.daily.temperature_2m_min[0]);

        document.getElementById("weather").innerHTML =
          `☀️ ${current}° (H:${high}° L:${low}°) • Lynchburg`;
      } catch {
        document.getElementById("weather").innerText = "Weather unavailable";
      }
    }
    getWeather();
    setInterval(getWeather, 10 * 60 * 1000);

    // BIRTHDAYS
    const birthdays = [
      { name: "Kohen", date: "2023-04-13" },
      { name: "Lauren", date: "1995-06-06" },
      { name: "Bobby", date: "1996-10-04" }
    ];

    function updateBirthday() {
      const today = new Date();
      let next = null;
      let minDiff = Infinity;

      birthdays.forEach(b => {
        const nextBirthday = new Date(today.getFullYear(), new Date(b.date).getMonth(), new Date(b.date).getDate());
        if (nextBirthday < today) nextBirthday.setFullYear(today.getFullYear() + 1);

        const diff = nextBirthday - today;

        if (diff < minDiff) {
          minDiff = diff;
          next = { ...b, nextBirthday };
        }
      });

      const days = Math.ceil(minDiff / (1000 * 60 * 60 * 24));
      const age = next.nextBirthday.getFullYear() - new Date(next.date).getFullYear();

      document.getElementById("birthday").innerHTML =
        `🎂 ${next.name} turns ${age} in ${days} days`;
    }
    updateBirthday();

    // COUNTDOWN
    const tripDate = new Date("2026-06-05T00:00:00");

    function updateCountdown() {
      const now = new Date();
      const diff = tripDate - now;

      const days = Math.floor(diff / (1000*60*60*24));
      const hours = Math.floor((diff / (1000*60*60)) % 24);
      const minutes = Math.floor((diff / (1000*60)) % 60);

      document.getElementById("countdown").innerHTML =
        `✈️ Walt Disney World in ${days}d ${hours}h ${minutes}m`;
    }
    setInterval(updateCountdown, 60000);
    updateCountdown();

    // TRIVIA
    const triviaList = [
      "Mickey Mouse's first appearance was in Steamboat Willie.",
      "Elsa was originally supposed to be a villain.",
      "The Lion King is inspired by Hamlet.",
      "Walt Disney was afraid of mice.",
      "Toy Story was the first fully computer-animated movie.",
      "Pirates of the Caribbean ride came before the movies.",
      "Genie was inspired by Robin Williams' improv.",
      "Disney World is about the size of San Francisco."
    ];

    function updateTrivia() {
      const start = new Date(2024, 0, 1);
      const now = new Date();
      const days = Math.floor((now - start) / (1000*60*60*24));
      const index = days % triviaList.length;

      document.getElementById("trivia").innerHTML =
        `🎬 Disney Trivia: ${triviaList[index]}`;
    }

    updateTrivia();
    setInterval(updateTrivia, 60 * 60 * 1000);
  </script>
  <script>
async function loadSchedule() {
  try {
    const url = "https://calendar.google.com/calendar/ical/lbkeating20%40gmail.com/public/basic.ics";

    const proxy = "https://api.allorigins.win/raw?url=" + encodeURIComponent(url);
const res = await fetch(proxy);
    const text = await res.text();

    const events = text.split("BEGIN:VEVENT").slice(1);

    const now = new Date();
    const startOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const endOfDay = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);

    const todaysEvents = [];

    events.forEach(e => {
      const startMatch = e.match(/DTSTART.*:(\d{8}T?\d*)/);
      const endMatch = e.match(/DTEND.*:(\d{8}T?\d*)/);
      const titleMatch = e.match(/SUMMARY:(.*)/);

      if (!startMatch || !titleMatch) return;

      function parseDate(raw) {
        const year = raw.substring(0,4);
        const month = raw.substring(4,6) - 1;
        const day = raw.substring(6,8);

        if (raw.includes("T")) {
          const hour = raw.substring(9,11);
          const min = raw.substring(11,13);
          return new Date(year, month, day, hour, min);
        }
        return new Date(year, month, day);
      }

      const start = parseDate(startMatch[1]);
      const end = endMatch ? parseDate(endMatch[1]) : start;

      if (start < endOfDay && end >= startOfDay) {
        let time = "";

        if (startMatch[1].includes("T")) {
          let h = start.getHours();
          const m = String(start.getMinutes()).padStart(2, "0");
          const ampm = h >= 12 ? "PM" : "AM";
          h = h % 12 || 12;
          time = `${h}:${m} ${ampm}`;
        }

        todaysEvents.push({
          title: titleMatch[1],
          time,
          sort: start
        });
      }
    });

    todaysEvents.sort((a,b) => a.sort - b.sort);

    const container = document.getElementById("events");

    if (todaysEvents.length === 0) {
      container.innerHTML = "<p>No events today</p>";
      return;
    }

    container.innerHTML = todaysEvents.map(e => `
      <div style="
        padding:10px 0;
        border-bottom:1px solid rgba(255,255,255,0.1);
        display:flex;
        justify-content:space-between;
      ">
        <span>${e.title}</span>
        <span style="opacity:0.7">${e.time}</span>
      </div>
    `).join("");

  } catch (err) {
    document.getElementById("events").innerHTML = "Unable to load schedule";
  }
}

loadSchedule();
</script>
</body>
</html>
