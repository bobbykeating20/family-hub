<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Hub</title>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  color:white;
  background: radial-gradient(circle at 20% 20%, #1a2a6c, #000);
}

.container {
  display:flex;
  flex-direction:column;
  height:100vh;
  padding:40px 60px;
  gap:25px;
  box-sizing:border-box;
}

.row {
  display:flex;
  justify-content:space-between;
  gap:20px;
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  padding:20px 25px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(0,0,0,0.4);
}

.big { font-size:32px; }
.medium { font-size:22px; }
.small { font-size:18px; opacity:0.8; }

.schedule {
  flex:1;
  overflow:auto;
}

.highlight {
  color:#ffd166;
  margin-bottom:10px;
  font-size:20px;
}
</style>
</head>

<body>

<div class="container">

  <!-- TOP -->
  <div class="row">
    <div class="card" id="clock"></div>
    <div class="card big" id="weather"></div>
  </div>

  <!-- MIDDLE -->
  <div class="row">
    <div class="card medium" id="birthday"></div>
    <div class="card medium" id="countdown"></div>
  </div>

  <!-- SCHEDULE -->
  <div class="card schedule">
    <div class="medium">📅 Schedule</div>
    <div id="nextEvent" class="highlight"></div>
    <div id="events" class="small"></div>
  </div>

  <!-- TRIVIA -->
  <div class="card small" id="trivia"></div>

</div>

<script>

// CLOCK (WITH SECONDS)
function updateClock() {
  const now = new Date();

  let h = now.getHours();
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');

  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;

  document.getElementById("clock").innerHTML =
    `🕒 ${h}:${m}:${s} ${ampm}<br>
     <span class="small">${now.toLocaleDateString(undefined,{
       weekday:'long',
       year:'numeric',
       month:'long',
       day:'numeric'
     })}</span>`;
}
setInterval(updateClock,1000);
updateClock();


// WEATHER
async function loadWeather() {
  const url = "https://api.open-meteo.com/v1/forecast?latitude=37.4138&longitude=-79.1422&current_weather=true&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=America/New_York";

  const res = await fetch(url);
  const data = await res.json();

  document.getElementById("weather").innerHTML =
    `☀️ ${Math.round(data.current_weather.temperature)}° (H:${Math.round(data.daily.temperature_2m_max[0])}° L:${Math.round(data.daily.temperature_2m_min[0])}°) • Lynchburg`;
}
loadWeather();


// BIRTHDAY
const birthdays = [
  {name:"Kohen", month:4, day:13},
  {name:"Lauren", month:6, day:6},
  {name:"Bobby", month:10, day:4}
];

function loadBirthday() {
  const today = new Date();
  let next, min = Infinity;

  birthdays.forEach(b => {
    let d = new Date(today.getFullYear(), b.month-1, b.day);
    if(d < today) d.setFullYear(today.getFullYear()+1);

    const diff = (d - today)/(1000*60*60*24);
    if(diff < min){ min = diff; next = b; }
  });

  document.getElementById("birthday").innerHTML =
    `🎂 ${next.name} in ${Math.floor(min)} days`;
}
loadBirthday();


// VACATION
const tripDate = new Date("2026-06-05T00:00:00");

function updateCountdown() {
  const now = new Date();
  const diff = tripDate - now;

  const d = Math.floor(diff/(1000*60*60*24));
  const h = Math.floor((diff/(1000*60*60))%24);
  const m = Math.floor((diff/(1000*60))%60);

  document.getElementById("countdown").innerHTML =
    `✈️ Walt Disney World in ${d}d ${h}h ${m}m`;
}
setInterval(updateCountdown,60000);
updateCountdown();


// 🔥 SCHEDULE (FINAL CORRECT VERSION)
const schedule = [
  { date:"2026-04-26", time:"09:00", title:"Church" },
  { date:"2026-04-26", time:"19:50", title:"Flight to Atlanta ✈️" },
  { date:"2026-04-27", time:"17:30", title:"Kohen Music 🎵" },
  { date:"2026-04-28", time:"09:00", title:"Kohen School 🏫" }
];

function loadSchedule() {
  const now = new Date();
  const todayStr = now.toISOString().slice(0,10);

  const tomorrow = new Date(now);
  tomorrow.setDate(now.getDate()+1);
  const tomorrowStr = tomorrow.toISOString().slice(0,10);

  const parsed = schedule.map(e => ({
    ...e,
    dt: new Date(`${e.date}T${e.time}`)
  }));

  const visible = parsed
    .filter(e => e.date === todayStr || e.date === tomorrowStr)
    .sort((a,b)=>a.dt - b.dt);

  const container = document.getElementById("events");
  const nextBox = document.getElementById("nextEvent");

  if (visible.length === 0) {
    container.innerHTML = "No events";
    nextBox.innerHTML = "";
    return;
  }

  const upcoming = parsed
    .filter(e => e.dt > now)
    .sort((a,b)=>a.dt - b.dt);

  if (upcoming.length > 0) {
    const next = upcoming[0];
    const diff = next.dt - now;

    const h = Math.floor(diff/(1000*60*60));
    const m = Math.floor((diff/(1000*60))%60);

    nextBox.innerHTML =
      `⏳ Next: ${next.title} in ${h}h ${m}m`;
  } else {
    nextBox.innerHTML = "✅ No more events today";
  }

  container.innerHTML = visible.map(e => {
    let h = e.dt.getHours();
    const m = String(e.dt.getMinutes()).padStart(2,'0');
    const ampm = h>=12?"PM":"AM";
    h = h%12 || 12;

    const isPast = e.dt < now;

    return `
      <div style="
        padding:12px 0;
        border-bottom:1px solid rgba(255,255,255,0.1);
        display:flex;
        justify-content:space-between;
        opacity:${isPast ? 0.5 : 1};
      ">
        <span>${e.title}</span>
        <span>${h}:${m} ${ampm}</span>
      </div>
    `;
  }).join("");
}

loadSchedule();
setInterval(loadSchedule,60000);


// TRIVIA
const trivia = [
  "Mickey Mouse debuted in Steamboat Willie.",
  "Genie was inspired by Robin Williams' improv.",
  "Disney World is the size of San Francisco.",
  "Epcot was planned as a real city.",
  "Cinderella Castle is 189 feet tall."
];

document.getElementById("trivia").innerHTML =
  "🎬 Disney Trivia: " + trivia[new Date().getDate() % trivia.length];

</script>

</body>
</html>
