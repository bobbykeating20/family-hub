<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Family Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  color: white;
  background: radial-gradient(circle at top left, #1a2a6c, #0b0f2a 70%);
}

.container {
  padding: 40px;
  display: flex;
  flex-direction: column;
  gap: 25px;
}

.row {
  display: flex;
  justify-content: space-between;
  gap: 20px;
}

.card {
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 20px 25px;
  flex: 1;
}

.big {
  font-size: 28px;
  font-weight: 600;
}

.sub {
  opacity: 0.7;
  margin-top: 5px;
}

.schedule {
  min-height: 250px;
}

.event {
  margin: 6px 0;
}

.past {
  opacity: 0.4;
}

.day-header {
  margin-top: 15px;
  font-weight: 600;
  opacity: 0.8;
}

.trivia {
  opacity: 0.8;
}
</style>
</head>

<body>

<div class="container">

  <!-- TOP ROW -->
  <div class="row">
    <div class="card">
      <div class="big" id="clock"></div>
      <div class="sub" id="date"></div>
    </div>

    <div class="card">
      <div class="big" id="weather">Loading weather...</div>
    </div>
  </div>

  <!-- SECOND ROW -->
  <div class="row">
    <div class="card" id="birthday"></div>
    <div class="card" id="vacation"></div>
  </div>

  <!-- SCHEDULE -->
  <div class="card schedule">
    <div class="big">📅 Schedule</div>
    <div id="nextEvent" class="sub"></div>
    <div id="events"></div>
  </div>

  <!-- TRIVIA -->
  <div class="card trivia">
    🎬 Disney Trivia: Genie was inspired by Robin Williams' improv.
  </div>

</div>

<script>
// CLOCK (with seconds)
function updateClock() {
  const now = new Date();

  document.getElementById("clock").textContent =
    now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  document.getElementById("date").textContent =
    now.toLocaleDateString(undefined, {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });
}
setInterval(updateClock, 1000);
updateClock();

// WEATHER (simple + stable)
async function loadWeather() {
  try {
    const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=37.41&longitude=-79.14&current_weather=true&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=America/New_York");
    const data = await res.json();

    const current = Math.round(data.current_weather.temperature);
    const high = Math.round(data.daily.temperature_2m_max[0]);
    const low = Math.round(data.daily.temperature_2m_min[0]);

    document.getElementById("weather").textContent =
      `☀️ ${current}° (H:${high}° L:${low}°) • Lynchburg`;
  } catch {
    document.getElementById("weather").textContent = "Weather unavailable";
  }
}
loadWeather();

// BIRTHDAYS (with age)
const birthdays = [
  { name: "Kohen", date: "2023-04-13" },
  { name: "Lauren", date: "1995-06-06" },
  { name: "Bobby", date: "1996-10-04" }
];

function getNextBirthday() {
  const now = new Date();

  let soonest = null;

  birthdays.forEach(person => {
    const bday = new Date(person.date);
    const next = new Date(now.getFullYear(), bday.getMonth(), bday.getDate());

    if (next < now) next.setFullYear(now.getFullYear() + 1);

    const diffDays = Math.ceil((next - now) / (1000 * 60 * 60 * 24));
    const age = next.getFullYear() - bday.getFullYear();

    if (!soonest || diffDays < soonest.days) {
      soonest = {
        text: `🎂 ${person.name} turns ${age} in ${diffDays} days`,
        days: diffDays
      };
    }
  });

  document.getElementById("birthday").textContent = soonest.text;
}
getNextBirthday();

// VACATION COUNTDOWN
const vacationDate = new Date("2026-06-05T00:00:00");

function updateVacation() {
  const now = new Date();
  const diff = vacationDate - now;

  const days = Math.floor(diff / (1000*60*60*24));
  const hours = Math.floor((diff / (1000*60*60)) % 24);
  const mins = Math.floor((diff / (1000*60)) % 60);

  document.getElementById("vacation").textContent =
    `✈️ Walt Disney World in ${days}d ${hours}h ${mins}m`;
}
setInterval(updateVacation, 60000);
updateVacation();

// SCHEDULE (NEXT 5 DAYS)
const schedule = [
  { title: "Church", date: "2026-04-26", time: "09:00" },
  { title: "Flight to Atlanta", date: "2026-04-26", time: "19:50" },
  { title: "Kohen Music", date: "2026-04-27", time: "17:30" },
  { title: "Kohen School", date: "2026-04-28", time: "09:00" },
  { title: "Kohen School", date: "2026-04-29", time: "09:00" },
  { title: "Kohen Soccer", date: "2026-05-02", time: "10:00" }
];

function loadSchedule() {
  const now = new Date();

  // next 5 days
  const days = [];
  for (let i=0;i<5;i++){
    const d = new Date();
    d.setDate(now.getDate()+i);
    days.push(d.toISOString().slice(0,10));
  }

  const events = schedule
    .map(e => ({
      ...e,
      dt: new Date(e.date + "T" + e.time)
    }))
    .filter(e => days.includes(e.date))
    .sort((a,b)=>a.dt - b.dt);

  const container = document.getElementById("events");
  container.innerHTML = "";

  if (!events.length) {
    container.innerHTML = "<div>No events</div>";
    return;
  }

  // NEXT EVENT
  const next = events.find(e => e.dt > now);
  if (next) {
    const diff = Math.round((next.dt - now)/(1000*60*60));
    document.getElementById("nextEvent").textContent =
      `Next event in ${diff} hours`;
  }

  let currentDay = "";

  events.forEach(e => {
    if (e.date !== currentDay) {
      currentDay = e.date;

      const d = new Date(e.date);
      const header = document.createElement("div");
      header.className = "day-header";
      header.textContent = d.toLocaleDateString(undefined,{
        weekday:'long',month:'long',day:'numeric',year:'numeric'
      });
      container.appendChild(header);
    }

    const div = document.createElement("div");
    div.className = "event";

    if (e.dt < now) div.classList.add("past");

    div.textContent =
      `${new Date("1970-01-01T"+e.time).toLocaleTimeString([], {hour:'numeric',minute:'2-digit'})} - ${e.title}`;

    container.appendChild(div);
  });
}

loadSchedule();

</script>

</body>
</html>
