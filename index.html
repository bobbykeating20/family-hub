<!DOCTYPE html>
<html>
<head>
  <title>Family Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #0a0a0a, #1a1a1a);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 40px;
      box-sizing: border-box;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      font-size: 32px;
    }

    .middle-row {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
      font-size: 28px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    .schedule {
      margin-top: 40px;
      flex-grow: 1;
      font-size: 24px;
    }

    .trivia {
      margin-top: 20px;
      font-size: 22px;
      opacity: 0.85;
    }

    @media (max-width: 768px) {
      .top-row, .middle-row {
        flex-direction: column;
        gap: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="top-row">
      <div class="card" id="clock">🕒 --:--</div>
      <div class="card" id="weather">☀️ Loading weather...</div>
    </div>

    <div class="middle-row">
      <div class="card">🎂 Next Birthday: Kohen (14 days)</div>
      <div class="card">✈️ Disney Cruise in 62 days</div>
    </div>

    <div class="card schedule">
      📅 Today's Schedule
      <p>No events yet</p>
    </div>

    <div class="card trivia">
      🎬 Disney Trivia: Mickey Mouse's first appearance was in Steamboat Willie.
    </div>

  </div>
<script>
  function updateClock() {
    const now = new Date();

    const options = {
      hour: 'numeric',
      minute: '2-digit',
      second: '2-digit',
      hour12: true,
      timeZone: 'America/New_York'
    };

    const timeString = now.toLocaleTimeString([], options);

    document.getElementById('clock').innerHTML = "🕒 " + timeString;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>  
<script>
  async function getWeather() {
    try {
      // Lynchburg coordinates
      const lat = 37.4138;
      const lon = -79.1422;

      // Step 1: Get forecast URL
      const pointsRes = await fetch(`https://api.weather.gov/points/${lat},${lon}`);
      const pointsData = await pointsRes.json();

      const forecastUrl = pointsData.properties.forecast;

      // Step 2: Get forecast
      const forecastRes = await fetch(forecastUrl);
      const forecastData = await forecastRes.json();

      const today = forecastData.properties.periods[0];

      const temp = today.temperature;
      const condition = today.shortForecast;

      document.getElementById("weather").innerHTML =
        `🌤️ ${temp}° • ${condition} • Lynchburg`;

    } catch (error) {
      document.getElementById("weather").innerHTML =
        "Weather unavailable";
    }
  }

  getWeather();
</script>  
</body>
</html>
