<!DOCTYPE html>
<html>
<head>
  <title>Family Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #0a0a0a, #1a1a1a);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 40px;
      box-sizing: border-box;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      font-size: 32px;
    }

    .middle-row {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
      font-size: 28px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    .schedule {
      margin-top: 40px;
      flex-grow: 1;
      font-size: 24px;
    }

    .trivia {
      margin-top: 20px;
      font-size: 22px;
      opacity: 0.85;
    }

    @media (max-width: 768px) {
      .top-row, .middle-row {
        flex-direction: column;
        gap: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="top-row">
      <div class="card" id="clock">🕒 --:--</div>
      <div class="card" id="weather">☀️ Loading weather...</div>
    </div>

    <div class="middle-row">
      <div class="card">🎂 Next Birthday: Kohen (14 days)</div>
      <div class="card">✈️ Disney Cruise in 62 days</div>
    </div>

    <div class="card schedule">
      📅 Today's Schedule
      <p>No events yet</p>
    </div>

    <div class="card trivia">
      🎬 Disney Trivia: Mickey Mouse's first appearance was in Steamboat Willie.
    </div>

  </div>
<script>
  function updateClock() {
    const now = new Date();

    const options = {
      hour: 'numeric',
      minute: '2-digit',
      second: '2-digit',
      hour12: true,
      timeZone: 'America/New_York'
    };

    const timeString = now.toLocaleTimeString([], options);

    document.getElementById('clock').innerHTML = "🕒 " + timeString;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>  
<script>
  async function getWeather() {
    try {
      const lat = 37.4138;
      const lon = -79.1422;

      const res = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=America/New_York`
      );

      const data = await res.json();

      const currentTemp = Math.round(data.current_weather.temperature);
      const high = Math.round(data.daily.temperature_2m_max[0]);
      const low = Math.round(data.daily.temperature_2m_min[0]);

      // Optional: basic condition mapping
      const weatherCode = data.current_weather.weathercode;
      let condition = "Clear";

      if ([1,2,3].includes(weatherCode)) condition = "Partly Cloudy";
      if ([45,48].includes(weatherCode)) condition = "Foggy";
      if ([51,53,55,61,63,65].includes(weatherCode)) condition = "Rainy";
      if ([71,73,75].includes(weatherCode)) condition = "Snowy";
      if ([95,96,99].includes(weatherCode)) condition = "Stormy";

      document.getElementById("weather").innerHTML =
        `🌤️ ${currentTemp}° (H:${high}° L:${low}°) • ${condition} • Lynchburg`;

    } catch (error) {
      document.getElementById("weather").innerHTML =
        "Weather unavailable";
    }
  }

  getWeather();
</script>
</body>
</html>
