<!DOCTYPE html>
<html>
<head>
  <title>Family Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background: linear-gradient(to bottom, #0a0a0a, #1a1a1a);
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      padding: 40px;
      box-sizing: border-box;
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      font-size: 32px;
    }

    .middle-row {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
      font-size: 28px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px 30px;
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }

    .schedule {
      margin-top: 40px;
      flex-grow: 1;
      font-size: 24px;
    }

    .trivia {
      margin-top: 20px;
      font-size: 22px;
      opacity: 0.85;
    }

    @media (max-width: 768px) {
      .top-row, .middle-row {
        flex-direction: column;
        gap: 15px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <div class="top-row">
      <div class="card" id="clock">🕒 --:--</div>
      <div class="card" id="weather">☀️ Loading weather...</div>
    </div>

    <div class="middle-row">
      <div class="card" id="birthday">🎂 Loading birthday...</div>
      <div class="card" id="countdown">✈️ Loading countdown...</div>
    </div>

    <div class="card schedule" id="schedule">
      📅 Today's Schedule
      <p>Loading events...</p>
    </div>

    <div class="card trivia">
      🎬 Disney Trivia: Mickey Mouse's first appearance was in Steamboat Willie.
    </div>

  </div>
<script>
  function updateClock() {
    const now = new Date();

    const timeOptions = {
      hour: 'numeric',
      minute: '2-digit',
      second: '2-digit',
      hour12: true,
      timeZone: 'America/New_York'
    };

    const dateOptions = {
      weekday: 'long',
      month: 'long',
      day: 'numeric',
      year: 'numeric',
      timeZone: 'America/New_York'
    };

    const timeString = now.toLocaleTimeString([], timeOptions);
    const dateString = now.toLocaleDateString([], dateOptions);

    document.getElementById('clock').innerHTML =
      `🕒 ${timeString}<br>
       <span style="font-size:22px; opacity:0.85;">${dateString}</span>`;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>
<script>
  async function getWeather() {
    try {
      const lat = 37.4138;
      const lon = -79.1422;

      const res = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=temperature_2m_max,temperature_2m_min&temperature_unit=fahrenheit&timezone=America/New_York`
      );

      const data = await res.json();

      const currentTemp = Math.round(data.current_weather.temperature);
      const high = Math.round(data.daily.temperature_2m_max[0]);
      const low = Math.round(data.daily.temperature_2m_min[0]);

      // Optional: basic condition mapping
      const weatherCode = data.current_weather.weathercode;
      let condition = "Clear";

      if ([1,2,3].includes(weatherCode)) condition = "Partly Cloudy";
      if ([45,48].includes(weatherCode)) condition = "Foggy";
      if ([51,53,55,61,63,65].includes(weatherCode)) condition = "Rainy";
      if ([71,73,75].includes(weatherCode)) condition = "Snowy";
      if ([95,96,99].includes(weatherCode)) condition = "Stormy";

      document.getElementById("weather").innerHTML =
        `🌤️ ${currentTemp}° (H:${high}° L:${low}°) • ${condition} • Lynchburg`;

    } catch (error) {
      document.getElementById("weather").innerHTML =
        "Weather unavailable";
    }
  }

  getWeather();
</script>
<script>
  function updateCountdown() {
    // 👉 SET YOUR NEXT VACATION DATE HERE
    const tripName = "Walt Disney World";
    const tripDate = new Date("2026-06-06T00:00:00");

    const now = new Date();
    const diff = tripDate - now;

    if (diff <= 0) {
      document.getElementById("countdown").innerHTML =
        `✈️ ${tripName} is happening now!`;
      return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);

    document.getElementById("countdown").innerHTML =
      `✈️ ${tripName} in ${days}d ${hours}h ${minutes}m`;
  }

  setInterval(updateCountdown, 1000);
  updateCountdown();
</script>
<script>
  const birthdays = [
    { name: "Kohen", date: "2023-04-13" },
    { name: "Lauren", date: "1995-06-06" },
    { name: "Bobby", date: "1996-10-04" }
  ];

  function getNextBirthday() {
    const now = new Date();

    let nextBirthday = null;

    birthdays.forEach(person => {
      const [year, month, day] = person.date.split("-");
      let nextDate = new Date(now.getFullYear(), month - 1, day);

      // If birthday already happened this year → move to next year
      if (nextDate < now) {
        nextDate.setFullYear(now.getFullYear() + 1);
      }

      const diff = nextDate - now;

      if (!nextBirthday || diff < nextBirthday.diff) {
        nextBirthday = {
          ...person,
          nextDate,
          diff
        };
      }
    });

    return nextBirthday;
  }

  function updateBirthday() {
    const el = document.getElementById("birthday");
    if (!el) return;

    const next = getNextBirthday();

    const days = Math.ceil(next.diff / (1000 * 60 * 60 * 24));

    const birthYear = parseInt(next.date.split("-")[0]);
    const age = next.nextDate.getFullYear() - birthYear;

    // 🎉 Special case: today is the birthday
    if (days === 0) {
      el.innerHTML = `🎉 Today is ${next.name}'s ${age}th birthday!`;
      return;
    }

    el.innerHTML =
      `🎂 ${next.name} turns ${age} in ${days} day${days !== 1 ? "s" : ""}`;
  }

  // Run after page loads
  window.addEventListener("load", updateBirthday);
</script>
<script>
  async function getSchedule() {
    try {
      const url = "https://calendar.google.com/calendar/ical/lbkeating20%40gmail.com/public/basic.ics";

      const response = await fetch(`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`);
      const text = await response.text();

      // Get today's date in local timezone
      const now = new Date();
      const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const endOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);

      const events = text.split("BEGIN:VEVENT").slice(1);

      let todaysEvents = [];

      events.forEach(event => {
        const startMatch = event.match(/DTSTART.*:(\d{8}T?\d*)/);
        const endMatch = event.match(/DTEND.*:(\d{8}T?\d*)/);
        const titleMatch = event.match(/SUMMARY:(.*)/);

        if (!startMatch || !titleMatch) return;

        let startRaw = startMatch[1];
        let endRaw = endMatch ? endMatch[1] : startRaw;

        function parseDate(raw) {
          const year = raw.substring(0, 4);
          const month = raw.substring(4, 6) - 1;
          const day = raw.substring(6, 8);

          if (raw.includes("T")) {
            const hour = raw.substring(9, 11);
            const minute = raw.substring(11, 13);
            return new Date(year, month, day, hour, minute);
          } else {
            return new Date(year, month, day);
          }
        }

        const startDate = parseDate(startRaw);
        const endDate = parseDate(endRaw);

        // Check if event overlaps today
        if (startDate < endOfToday && endDate >= startOfToday) {
          let time = "";

          if (startRaw.includes("T")) {
            let hours = startDate.getHours();
            const minutes = String(startDate.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? "PM" : "AM";
            hours = hours % 12 || 12;

            time = `${hours}:${minutes} ${ampm}`;
          }

          todaysEvents.push({
            title: titleMatch[1],
            time,
            sort: startDate
          });
        }
      });

      // Sort by time
      todaysEvents.sort((a, b) => a.sort - b.sort);

      const el = document.getElementById("schedule");

      if (todaysEvents.length === 0) {
        el.innerHTML = "📅 Today's Schedule<br><p>No events today</p>";
      } else {
        el.innerHTML =
          "📅 Today's Schedule<br>" +
          todaysEvents.map(e =>
            `<p>• ${e.time ? e.time + " – " : ""}${e.title}</p>`
          ).join("");
      }

    } catch (error) {
      document.getElementById("schedule").innerHTML =
        "📅 Unable to load schedule";
    }
  }

  getSchedule();
</script>
</body>
</html>
