<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>

<style>
body {
  margin:0;
  font-family:-apple-system,sans-serif;
  background:#031024;
  color:white;
}

/* HEADER */
.header {
  text-align:center;
  padding:20px;
  font-size:20px;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  padding:0 20px 10px;
}

/* GRID */
.calendar {
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  padding:10px;
}

.day {
  background:rgba(255,255,255,0.08);
  border-radius:10px;
  padding:6px;
  min-height:80px;
  font-size:12px;
}

.day-header {
  font-weight:600;
  margin-bottom:4px;
}

.event {
  font-size:10px;
  padding:2px 4px;
  border-radius:4px;
  margin-bottom:2px;
  cursor:pointer;
}

.family { background:#4da6ff; }
.work { background:#ff9f43; }
.travel { background:#10ac84; }

/* MODAL */
.modal {
  position:fixed;
  bottom:0;
  width:100%;
  background:#02142b;
  padding:20px;
  border-top-left-radius:20px;
  border-top-right-radius:20px;
}

input,select,button {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
}

button {
  background:#4da6ff;
  color:white;
}

.delete {
  background:#ff5c5c;
}
</style>
</head>

<body>

<div class="header">📆 Calendar</div>

<div class="nav">
  <button onclick="prev()">◀</button>
  <div id="month"></div>
  <button onclick="next()">▶</button>
</div>

<div class="calendar" id="calendar"></div>

<!-- MODAL -->
<div class="modal" id="modal" style="display:none;">
  <div id="dateLabel"></div>

  <input id="title" placeholder="Event name">
  <input type="time" id="time">

  <select id="category">
    <option value="family">Family</option>
    <option value="work">Work</option>
    <option value="travel">Travel</option>
  </select>

  <label>
    <input type="checkbox" id="repeat"> Weekly repeat
  </label>

  <button onclick="save()">Save Event</button>

  <button id="deleteBtn" class="delete" onclick="deleteEvent()" style="display:none;">
    Delete Event
  </button>

  <button onclick="closeModal()">Close</button>
</div>

<script>

let current = new Date();
let selectedDay = null;
let selectedEventId = null;

/* STORAGE */
function getEvents(){
  return JSON.parse(localStorage.getItem("events")||"[]");
}

function saveEvents(events){
  localStorage.setItem("events",JSON.stringify(events));
}

/* RENDER CALENDAR */
function render(){
  const y=current.getFullYear();
  const m=current.getMonth();

  document.getElementById("month").innerText =
    current.toLocaleString('default',{month:'long',year:'numeric'});

  const first=new Date(y,m,1).getDay();
  const days=new Date(y,m+1,0).getDate();

  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  for(let i=0;i<first;i++) cal.innerHTML+="<div></div>";

  for(let d=1;d<=days;d++){
    const date=new Date(y,m,d);

    const events=getEvents().filter(e=>{
      const ed=new Date(e.time);

      if(e.repeat){
        return ed.getDay()===date.getDay();
      }

      return ed.toDateString()===date.toDateString();
    });

    let html=`<div class="day" onclick="openModal(${d})">
      <div class="day-header">${d}</div>`;

    events.forEach(e=>{
      html+=`<div class="event ${e.category}"
        onclick="eventClick(event, ${e.id})">
        ${new Date(e.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}
      </div>`;
    });

    html+="</div>";

    cal.innerHTML+=html;
  }
}

/* OPEN NEW EVENT */
function openModal(day){
  selectedDay=day;
  selectedEventId=null;

  document.getElementById("modal").style.display="block";

  const date=new Date(current.getFullYear(),current.getMonth(),day);
  document.getElementById("dateLabel").innerText=date.toDateString();

  document.getElementById("title").value="";
  document.getElementById("time").value="";
  document.getElementById("repeat").checked=false;
  document.getElementById("deleteBtn").style.display="none";
}

/* CLICK EXISTING EVENT */
function eventClick(e,id){
  e.stopPropagation();

  const ev=getEvents().find(x=>x.id===id);
  selectedEventId=id;

  document.getElementById("modal").style.display="block";
  document.getElementById("title").value=ev.title;

  const t=new Date(ev.time);
  document.getElementById("time").value=t.toTimeString().slice(0,5);

  document.getElementById("category").value=ev.category;
  document.getElementById("repeat").checked=ev.repeat;

  document.getElementById("deleteBtn").style.display="block";
}

/* SAVE */
function save(){
  const title=document.getElementById("title").value;
  const time=document.getElementById("time").value;
  const category=document.getElementById("category").value;
  const repeat=document.getElementById("repeat").checked;

  if(!title || !time) {
    alert("Fill out all fields");
    return;
  }

  const date=new Date(current.getFullYear(),current.getMonth(),selectedDay);
  const full=new Date(`${date.toISOString().split('T')[0]}T${time}`);

  let events=getEvents();

  if(selectedEventId){
    events = events.map(e =>
      e.id===selectedEventId
        ? {...e,title,time:full.toISOString(),category,repeat}
        : e
    );
  } else {
    events.push({
      id:Date.now(),
      title,
      time:full.toISOString(),
      category,
      repeat
    });
  }

  saveEvents(events);

  closeModal();
  render();
}

/* DELETE */
function deleteEvent(){
  let events=getEvents();
  events=events.filter(e=>e.id!==selectedEventId);

  saveEvents(events);

  closeModal();
  render();
}

/* CLOSE */
function closeModal(){
  document.getElementById("modal").style.display="none";
  selectedEventId=null;
}

/* NAV */
function prev(){
  current.setMonth(current.getMonth()-1);
  render();
}

function next(){
  current.setMonth(current.getMonth()+1);
  render();
}

render();

</script>

</body>
</html>
