<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #0a1f44, #07152d);
  color: white;
}

/* HEADER */
.header {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 16px 20px;
}

.home {
  justify-self: start;
}

.home button {
  background: rgba(255,255,255,0.1);
  border: none;
  padding: 10px 14px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

.month {
  text-align: center;
  font-size: 22px;
  font-weight: 600;
}

.nav {
  justify-self: end;
  display: flex;
  gap: 8px;
}

.nav button {
  background: rgba(255,255,255,0.1);
  border: none;
  padding: 10px 12px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

/* GRID */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 12px;
  padding: 20px;
}

.day {
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
  padding: 8px;
  min-height: 100px;
}

.day-number {
  font-size: 13px;
  opacity: 0.7;
}

.event {
  margin-top: 6px;
  font-size: 12px;
  background: rgba(255,255,255,0.15);
  padding: 4px 6px;
  border-radius: 6px;
}
</style>
</head>

<body>

<div class="header">
  <div class="home">
    <button onclick="window.location.href='index.html'">🏠 Home</button>
  </div>

  <div class="month" id="monthLabel"></div>

  <div class="nav">
    <button onclick="changeMonth(-1)">◀</button>
    <button onclick="changeMonth(1)">▶</button>
  </div>
</div>

<div class="calendar" id="calendar"></div>

<script>
let currentDate = new Date();

function changeMonth(direction) {
  currentDate.setMonth(currentDate.getMonth() + direction);
  loadCalendar();
}

function renderSkeleton(year, month) {
  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    calendar.appendChild(document.createElement("div"));
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement("div");
    cell.className = "day";
    cell.dataset.day = d;

    const num = document.createElement("div");
    num.className = "day-number";
    num.innerText = d;

    cell.appendChild(num);
    calendar.appendChild(cell);
  }
}
</script>

<!-- FIREBASE -->
<script type="module">
const { initializeApp } = await import("https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js");
const { getFirestore, collection, getDocs } = await import("https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js");

const firebaseConfig = {
  apiKey: "AIzaSyC6xEf74Z0CdT3LkLysk5-CLvEbGpjyFBs",
  authDomain: "family-hub-717fc.firebaseapp.com",
  projectId: "family-hub-717fc",
  storageBucket: "family-hub-717fc.firebasestorage.app",
  messagingSenderId: "560654240272",
  appId: "1:560654240272:web:31df371ef66f2ba7d11895"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.loadCalendar = async function () {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  document.getElementById("monthLabel").innerText =
    currentDate.toLocaleString("default", { month: "long", year: "numeric" });

  renderSkeleton(year, month);

  const snapshot = await getDocs(collection(db, "events"));
  const events = [];

  snapshot.forEach(doc => events.push(doc.data()));

  events.forEach(event => {
    // 🔥 FIXED timezone-safe parsing
    const [y, m, d] = event.date.split("-").map(Number);
    const dateObj = new Date(y, m - 1, d);

    if (dateObj.getFullYear() === year && dateObj.getMonth() === month) {
      const cell = document.querySelector(`[data-day='${d}']`);
      if (!cell) return;

      const el = document.createElement("div");
      el.className = "event";
      el.innerText = `${formatTime(event.time)} - ${event.title}`;
      cell.appendChild(el);
    }
  });
};

function formatTime(time) {
  const [h, m] = time.split(":");
  let hour = parseInt(h);
  const ampm = hour >= 12 ? "PM" : "AM";
  hour = hour % 12 || 12;
  return `${hour}:${m} ${ampm}`;
}

loadCalendar();
</script>

</body>
</html>
