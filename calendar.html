<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

// 🔥 YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyC6xEf74Z0CdT3LkLysk5-CLvEbGpjyFBs",
  authDomain: "family-hub-717fc.firebaseapp.com",
  projectId: "family-hub-717fc",
  storageBucket: "family-hub-717fc.firebasestorage.app",
  messagingSenderId: "560654240272",
  appId: "1:560654240272:web:31df371ef66f2ba7d11895",
  measurementId: "G-5YFJXZHBTJ"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// 📅 LOAD EVENTS
async function loadEvents() {
  const querySnapshot = await getDocs(collection(db, "events"));

  const events = [];

  querySnapshot.forEach((doc) => {
    events.push(doc.data());
  });

  renderEvents(events);
}

// 🧠 RENDER INTO CALENDAR
function renderEvents(events) {
  events.forEach(event => {
    const day = new Date(event.date).getDate();

    const cell = document.querySelector(`[data-day='${day}']`);

    if (cell) {
      const el = document.createElement("div");
      el.className = "event";
      el.innerText = `${formatTime(event.time)} - ${event.title}`;
      cell.appendChild(el);
    }
  });
}

// ⏰ FORMAT TIME
function formatTime(time) {
  const [h, m] = time.split(":");
  let hour = parseInt(h);
  const ampm = hour >= 12 ? "PM" : "AM";
  hour = hour % 12 || 12;
  return `${hour}:${m} ${ampm}`;
}

loadEvents();
</script>
