<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #0a1f44;
  color: white;
}

.header {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: 600;
}

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 10px;
  padding: 20px;
}

.day {
  background: rgba(255,255,255,0.08);
  border-radius: 12px;
  padding: 8px;
  min-height: 80px;
}

.event {
  font-size: 11px;
  margin-top: 4px;
  background: rgba(255,255,255,0.2);
  padding: 3px 5px;
  border-radius: 5px;
}

#error {
  color: red;
  text-align: center;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="header" id="monthLabel">Loading...</div>
<div id="error"></div>
<div class="calendar" id="calendar"></div>

<script>
const calendar = document.getElementById("calendar");
const monthLabel = document.getElementById("monthLabel");
const errorDiv = document.getElementById("error");

const today = new Date();
const year = today.getFullYear();
const month = today.getMonth();

monthLabel.innerText = today.toLocaleString("default", { month: "long", year: "numeric" });

// Always render grid FIRST
function renderEmptyCalendar() {
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    calendar.appendChild(document.createElement("div"));
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement("div");
    cell.className = "day";
    cell.dataset.day = d;

    cell.innerHTML = `<div>${d}</div>`;
    calendar.appendChild(cell);
  }
}

renderEmptyCalendar();
</script>

<!-- FIREBASE (SAFE LOAD) -->
<script type="module">
try {
  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js");
  const { getFirestore, collection, getDocs } = await import("https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js");

  const firebaseConfig = {
    apiKey: "AIzaSyC6xEf74Z0CdT3LkLysk5-CLvEbGpjyFBs",
    authDomain: "family-hub-717fc.firebaseapp.com",
    projectId: "family-hub-717fc",
    storageBucket: "family-hub-717fc.firebasestorage.app",
    messagingSenderId: "560654240272",
    appId: "1:560654240272:web:31df371ef66f2ba7d11895"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const snapshot = await getDocs(collection(db, "events"));

  snapshot.forEach(doc => {
    const event = doc.data();
    const day = new Date(event.date).getDate();

    const cell = document.querySelector(`[data-day='${day}']`);
    if (!cell) return;

    const el = document.createElement("div");
    el.className = "event";

    const [h, m] = event.time.split(":");
    let hour = parseInt(h);
    const ampm = hour >= 12 ? "PM" : "AM";
    hour = hour % 12 || 12;

    el.innerText = `${hour}:${m} ${ampm} - ${event.title}`;
    cell.appendChild(el);
  });

} catch (err) {
  console.error(err);
  document.getElementById("error").innerText = "Error loading events (check console)";
}
</script>

</body>
</html>
