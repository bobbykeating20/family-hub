<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Calendar</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(180deg, #0a1f44, #07152d);
  color: white;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
}

.header-left, .header-right {
  display: flex;
  gap: 10px;
}

button {
  background: rgba(255,255,255,0.1);
  border: none;
  padding: 10px 14px;
  border-radius: 10px;
  color: white;
  cursor: pointer;
}

.month {
  font-size: 22px;
  font-weight: 600;
}

/* GRID */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 12px;
  padding: 20px;
}

.day {
  background: rgba(255,255,255,0.05);
  border-radius: 14px;
  padding: 8px;
  min-height: 100px;
  cursor: pointer;
  transition: 0.2s;
}

.day:hover {
  background: rgba(255,255,255,0.1);
}

.day-number {
  font-size: 13px;
  opacity: 0.7;
}

.event {
  margin-top: 6px;
  font-size: 12px;
  background: rgba(255,255,255,0.2);
  padding: 4px 6px;
  border-radius: 6px;
}

/* SIDE PANEL (APPLE STYLE) */
.panel {
  position: fixed;
  top: 0;
  right: -400px;
  width: 350px;
  height: 100%;
  background: #0f2a55;
  transition: 0.3s;
  padding: 20px;
  overflow-y: auto;
}

.panel.open {
  right: 0;
}

input, textarea {
  width: 100%;
  margin-bottom: 10px;
  padding: 8px;
  border-radius: 6px;
  border: none;
}

textarea {
  height: 80px;
}

.panel button {
  width: 100%;
  margin-top: 5px;
}

.event-card {
  background: rgba(255,255,255,0.1);
  padding: 8px;
  border-radius: 8px;
  margin-bottom: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="header-left">
    <button onclick="window.location.href='index.html'">🏠</button>
    <button onclick="goToday()">Today</button>
  </div>

  <div class="month" id="monthLabel"></div>

  <div class="header-right">
    <button onclick="changeMonth(-1)">◀</button>
    <button onclick="changeMonth(1)">▶</button>
  </div>
</div>

<div class="calendar" id="calendar"></div>

<!-- SIDE PANEL -->
<div class="panel" id="panel">
  <h2 id="panelDate"></h2>

  <div id="eventList"></div>

  <hr>

  <input type="text" id="titleInput" placeholder="Title">
  <input type="time" id="timeInput">
  <textarea id="descInput" placeholder="Description"></textarea>

  <button onclick="saveEvent()">Save</button>
  <button onclick="deleteEvent()" style="background:red;">Delete</button>
  <button onclick="closePanel()">Close</button>
</div>

<script>
let currentDate = new Date();
let selectedDate = null;
let selectedDocId = null;
let allEvents = [];

function goToday() {
  currentDate = new Date();
  loadCalendar();
}

function changeMonth(dir) {
  currentDate.setMonth(currentDate.getMonth() + dir);
  loadCalendar();
}

function renderCalendar(year, month) {
  const cal = document.getElementById("calendar");
  cal.innerHTML = "";

  const firstDay = new Date(year, month, 1).getDay();
  const days = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    cal.appendChild(document.createElement("div"));
  }

  for (let d = 1; d <= days; d++) {
    const cell = document.createElement("div");
    cell.className = "day";

    const num = document.createElement("div");
    num.className = "day-number";
    num.innerText = d;

    cell.appendChild(num);

    const dayEvents = allEvents.filter(e => e.date === formatDate(year, month, d));

    dayEvents.forEach(e => {
      const el = document.createElement("div");
      el.className = "event";
      el.innerText = e.title;
      cell.appendChild(el);
    });

    cell.onclick = () => openPanel(year, month, d);

    cal.appendChild(cell);
  }
}

function openPanel(y, m, d) {
  selectedDate = formatDate(y, m, d);
  document.getElementById("panel").classList.add("open");

  document.getElementById("panelDate").innerText =
    new Date(y, m, d).toDateString();

  renderEventList();
}

function closePanel() {
  document.getElementById("panel").classList.remove("open");
  selectedDocId = null;
}

function renderEventList() {
  const list = document.getElementById("eventList");
  list.innerHTML = "";

  const events = allEvents.filter(e => e.date === selectedDate);

  events.forEach(e => {
    const div = document.createElement("div");
    div.className = "event-card";
    div.innerText = `${e.time} - ${e.title}`;

    div.onclick = () => {
      selectedDocId = e.id;
      document.getElementById("titleInput").value = e.title;
      document.getElementById("timeInput").value = e.time;
      document.getElementById("descInput").value = e.description || "";
    };

    list.appendChild(div);
  });
}

function formatDate(y, m, d) {
  return new Date(y, m, d).toISOString().split("T")[0];
}
</script>

<script type="module">
const { initializeApp } = await import("https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js");
const { getFirestore, collection, getDocs, addDoc, deleteDoc, doc, updateDoc } =
  await import("https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js");

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "family-hub-717fc.firebaseapp.com",
  projectId: "family-hub-717fc",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.loadCalendar = async function () {
  const snap = await getDocs(collection(db, "events"));
  allEvents = [];

  snap.forEach(d => {
    allEvents.push({ ...d.data(), id: d.id });
  });

  const y = currentDate.getFullYear();
  const m = currentDate.getMonth();

  document.getElementById("monthLabel").innerText =
    currentDate.toLocaleString("default", { month: "long", year: "numeric" });

  renderCalendar(y, m);
};

window.saveEvent = async function () {
  const data = {
    title: titleInput.value,
    time: timeInput.value,
    date: selectedDate,
    description: descInput.value
  };

  if (selectedDocId) {
    await updateDoc(doc(db, "events", selectedDocId), data);
  } else {
    await addDoc(collection(db, "events"), data);
  }

  selectedDocId = null;
  loadCalendar();
  renderEventList();
};

window.deleteEvent = async function () {
  if (!selectedDocId) return;
  await deleteDoc(doc(db, "events", selectedDocId));
  selectedDocId = null;
  loadCalendar();
  renderEventList();
};

loadCalendar();
</script>

</body>
</html>
