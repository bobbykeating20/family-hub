<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keating Family Hub</title>

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont;
  background:linear-gradient(180deg,#0a1f44,#07152d);
  color:white;
}

.header {
  text-align:center;
  padding:20px;
}

.title {
  font-size:28px;
  letter-spacing:2px;
}

.greeting {
  opacity:0.7;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  padding:20px;
}

.card {
  background:rgba(255,255,255,0.08);
  border-radius:16px;
  padding:20px;
}

.big {
  font-size:36px;
}

.schedule {
  grid-column: span 2;
}

.event {
  margin-top:6px;
  opacity:0.9;
}

.button {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#3b82f6;
  padding:12px 16px;
  border-radius:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">KEATING FAMILY HUB</div>
  <div class="greeting" id="greeting"></div>
</div>

<div class="grid">
  <div class="card">
    <div class="big" id="time"></div>
    <div id="date"></div>
  </div>

  <div class="card">
    🌤 53° • Lynchburg
  </div>

  <div class="card">
    🎂 Lauren turns 31 in 40 days
  </div>

  <div class="card">
    ✈️ Disney Trip in 39 days
  </div>

  <div class="card schedule">
    <h3>Schedule</h3>
    <div id="nextEvent"></div>
    <div id="scheduleList"></div>
  </div>
</div>

<div class="button" onclick="window.location.href='calendar.html'">
📅 Calendar
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
import {
  getFirestore, collection, getDocs
} from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey:"AIza...",
  authDomain:"family-hub-717fc.firebaseapp.com",
  projectId:"family-hub-717fc"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

function updateClock(){
  const now = new Date();

  document.getElementById("time").innerText =
    now.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});

  document.getElementById("date").innerText =
    now.toDateString();

  const h = now.getHours();
  let greet = "Good evening";
  if(h < 12) greet="Good morning";
  else if(h < 17) greet="Good afternoon";

  document.getElementById("greeting").innerText = greet;
}

setInterval(updateClock,1000);
updateClock();

/* LOAD EVENTS */
async function loadEvents(){
  const snap = await getDocs(collection(db,"events"));
  const events = snap.docs.map(d=>d.data());

  const now = new Date();

  const upcoming = events
    .map(e=>{
      const dt = new Date(e.date+"T"+(e.time || "00:00"));
      return {...e, dt};
    })
    .filter(e=>e.dt > now)
    .sort((a,b)=>a.dt-b.dt);

  if(upcoming.length){
    const diff = Math.round((upcoming[0].dt - now)/3600000);
    document.getElementById("nextEvent").innerText =
      `Next event in ${diff} hours`;
  }

  const list = document.getElementById("scheduleList");
  list.innerHTML="";

  upcoming.slice(0,10).forEach(e=>{
    const div = document.createElement("div");
    div.className="event";
    div.innerText = `${e.dt.toDateString()} - ${e.time || "All Day"} ${e.title}`;
    list.appendChild(div);
  });

  scheduleNotifications(upcoming);
}

/* 🔔 NOTIFICATIONS */
function scheduleNotifications(events){
  if(Notification.permission !== "granted"){
    Notification.requestPermission();
    return;
  }

  const now = new Date();

  events.forEach(e=>{
    const diff = e.dt - now;

    if(diff > 0 && diff < 3600000){
      setTimeout(()=>{
        new Notification("Upcoming Event",{
          body:e.title
        });
      }, diff - 60000);
    }
  });
}

loadEvents();

/* AUTO REFRESH (TV MODE) */
setInterval(loadEvents,60000);
</script>

</body>
</html>
